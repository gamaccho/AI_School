  <!-- Rays -->
  <line x1="200" y1="65" x2="200" y2="50" stroke="#ffd60a" stroke-width="2" opacity="0.6"/>
  <line x1="245" y1="85" x2="258" y2="72" stroke="#ffd60a" stroke-width="2" opacity="0.6"/>
  <line x1="260" y1="130" x2="275" y2="130" stroke="#ffd60a" stroke-width="2" opacity="0.6"/>
  <line x1="155" y1="85" x2="142" y2="72" stroke="#ffd60a" stroke-width="2" opacity="0.6"/>
  <line x1="140" y1="130" x2="125" y2="130" stroke="#ffd60a" stroke-width="2" opacity="0.6"/>
