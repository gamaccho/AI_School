  <rect x="70" y="220" width="260" height="50" rx="8" fill="none" stroke="#00f5d4" stroke-width="1.5" opacity="0.5"/>
  <text x="200" y="240" text-anchor="middle" font-family="serif" font-size="10" fill="#00f5d4" opacity="0.9">発想 → 企画 → 構造化</text>
  <text x="200" y="258" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffd60a" opacity="0.7">IDEATION &amp; PLANNING</text>
