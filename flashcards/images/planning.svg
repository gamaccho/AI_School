  <line x1="180" y1="175" x2="180" y2="190" stroke="#ffd60a" stroke-width="3"/>
  <line x1="220" y1="175" x2="220" y2="190" stroke="#ffd60a" stroke-width="3"/>
  <line x1="175" y1="195" x2="225" y2="195" stroke="#ffd60a" stroke-width="2.5"/>
  <line x1="178" y1="205" x2="222" y2="205" stroke="#ffd60a" stroke-width="2"/>
  <!-- Inner glow -->
  <ellipse cx="200" cy="130" rx="30" ry="35" fill="#ffd60a" opacity="0.08"/>
