<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a0f"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg6)"/>
  <!-- Storyboard frames -->
  <!-- Frame 1: Close up -->
  <rect x="30" y="50" width="100" height="75" rx="3" fill="none" stroke="#00f5d4" stroke-width="1.5"/>
  <circle cx="80" cy="80" r="18" fill="none" stroke="#00f5d4" stroke-width="1" opacity="0.6"/>
  <ellipse cx="80" cy="75" rx="10" ry="12" fill="#00f5d4" opacity="0.15"/>
  <text x="80" y="140" text-anchor="middle" font-family="monospace" font-size="7" fill="#00f5d4" opacity="0.7">CLOSE-UP</text>
  <!-- Frame 2: Wide -->
  <rect x="150" y="50" width="100" height="75" rx="3" fill="none" stroke="#ffd60a" stroke-width="1.5"/>
  <line x1="165" y1="110" x2="235" y2="110" stroke="#ffd60a" stroke-width="1" opacity="0.4"/>
  <ellipse cx="200" cy="100" rx="8" ry="10" fill="#ffd60a" opacity="0.2"/>
  <line x1="192" y1="110" x2="185" y2="125" stroke="#ffd60a" opacity="0.4"/>
  <line x1="208" y1="110" x2="215" y2="125" stroke="#ffd60a" opacity="0.4"/>
  <text x="200" y="140" text-anchor="middle" font-family="monospace" font-size="7" fill="#ffd60a" opacity="0.7">WIDE SHOT</text>
  <!-- Frame 3: Low angle -->
  <rect x="270" y="50" width="100" height="75" rx="3" fill="none" stroke="#f72585" stroke-width="1.5"/>
  <rect x="285" y="95" width="70" height="20" rx="2" fill="#f72585" opacity="0.1"/>
  <line x1="320" y1="65" x2="320" y2="95" stroke="#f72585" opacity="0.5"/>
  <polygon points="310,65 320,50 330,65" fill="#f72585" opacity="0.5"/>
  <text x="320" y="140" text-anchor="middle" font-family="monospace" font-size="7" fill="#f72585" opacity="0.7">LOW ANGLE</text>
  <!-- Arrows between frames -->
  <polygon points="132,85 148,88 132,91" fill="#ffffff" opacity="0.3"/>
  <polygon points="252,85 268,88 252,91" fill="#ffffff" opacity="0.3"/>
  <!-- Imaginary line -->
  <line x1="30" y1="190" x2="370" y2="190" stroke="#7209b7" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="200" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#7209b7" opacity="0.9">IMAGINARY LINE 180°</text>
  <!-- Camera motions -->
  <text x="60" y="240" font-family="monospace" font-size="10" fill="#00f5d4" opacity="0.8">Pan →</text>
  <text x="155" y="240" font-family="monospace" font-size="10" fill="#ffd60a" opacity="0.8">Tilt ↑</text>
  <text x="250" y="240" font-family="monospace" font-size="10" fill="#f72585" opacity="0.8">Zoom ⊕</text>
</svg>