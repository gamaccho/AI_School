  <line x1="135" y1="65" x2="265" y2="65" stroke="#00f5d4" stroke-width="1.5" opacity="0.6"/>
  <line x1="150" y1="80" x2="250" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="92" x2="260" y2="92" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="135" y1="110" x2="200" y2="110" stroke="#ffd60a" stroke-width="1.5" opacity="0.7"/>
  <line x1="165" y1="122" x2="255" y2="122" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="165" y1="134" x2="245" y2="134" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="165" y1="146" x2="250" y2="146" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="135" y1="164" x2="195" y2="164" stroke="#ffd60a" stroke-width="1.5" opacity="0.7"/>
