  <circle cx="325" cy="102" r="5" fill="#f72585" opacity="0.5"/>
  <polygon points="360,92 375,102 360,112" fill="#f72585" opacity="0.8"/>
  <!-- "Show Don't Tell" -->
  <text x="200" y="268" text-anchor="middle" font-family="serif" font-style="italic" font-size="13" fill="#ffd60a" opacity="0.9">Show, Don't Tell</text>
  <line x1="80" y1="268" x2="140" y2="268" stroke="#ffd60a" stroke-width="1" opacity="0.4"/>
  <line x1="260" y1="268" x2="320" y2="268" stroke="#ffd60a" stroke-width="1" opacity="0.4"/>
