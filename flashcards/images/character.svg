<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg3)"/>
  <!-- Character silhouette -->
  <circle cx="200" cy="95" r="32" fill="none" stroke="#f72585" stroke-width="2" opacity="0.8"/>
  <circle cx="200" cy="95" r="20" fill="#f72585" opacity="0.1"/>
  <line x1="200" y1="127" x2="200" y2="200" stroke="#f72585" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="155" x2="160" y2="180" stroke="#f72585" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="155" x2="240" y2="180" stroke="#f72585" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="200" x2="175" y2="240" stroke="#f72585" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="200" x2="225" y2="240" stroke="#f72585" stroke-width="2" opacity="0.7"/>
  <!-- Inner psyche diagram -->
  <ellipse cx="200" cy="95" rx="12" ry="8" fill="#7209b7" opacity="0.6"/>
  <!-- Want/Need labels -->
  <rect x="50" y="140" width="70" height="24" rx="4" fill="none" stroke="#00f5d4" stroke-width="1"/>
  <text x="85" y="156" text-anchor="middle" font-family="monospace" font-size="10" fill="#00f5d4">WANT</text>
  <rect x="280" y="140" width="70" height="24" rx="4" fill="none" stroke="#f72585" stroke-width="1"/>
  <text x="315" y="156" text-anchor="middle" font-family="monospace" font-size="10" fill="#f72585">NEED</text>
  <line x1="120" y1="152" x2="168" y2="152" stroke="#00f5d4" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="232" y1="152" x2="280" y2="152" stroke="#f72585" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- Ghost label -->
  <text x="200" y="270" text-anchor="middle" font-family="serif" font-style="italic" font-size="11" fill="#7209b7" opacity="0.9">Ghost · Lie · Save the Cat</text>
</svg>